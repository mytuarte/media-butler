version: "3.9"

services:
  media-butler:
    container_name: media-butler

    build:
      context: .
      dockerfile: docker/Dockerfile

    restart: unless-stopped

    env_file:
      - ./config/.env

    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /volume2:/volume2:ro

    ports:
      - "5000:5000"